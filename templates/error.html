{% extends "base.html" %}
{% block title %}{{ title }} — CUST CertSystem{% endblock %}

{% block content %}
<div class="fade-in min-h-[70vh] flex items-center justify-center">
  <div class="max-w-md w-full text-center bg-white rounded-2xl border border-slate-100
              shadow-lg p-10">
    <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667
             1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464
             0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-slate-800 mb-2">{{ title }}</h1>
    <p class="text-slate-500 text-sm leading-relaxed mb-7">{{ message | safe }}</p>

    <a href="javascript:history.back()"
       class="inline-flex items-center gap-2 bg-cust-700 hover:bg-cust-800
              text-white font-semibold px-6 py-3 rounded-xl shadow-md text-sm">
      ← Go Back
    </a>
  </div>
</div>
{% endblock %}
